<html>
	
  <body bgcolor="transparent" style='margin:0px;padding:0px;'>
    <!-- 1. The <div> tag will contain the <iframe> (and video player) -->
    <div id="player" style="left:0px;top:0px;width:100%;height:100%;"></div>

    <script>
    	
      // 2. This code loads the IFrame Player API code asynchronously.
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
	  
	  var hrefUrl= location.href;

      // 3. This function creates an <iframe> (and YouTube player)
      //    after the API code downloads.
      var player;
      
      function onYouTubeIframeAPIReady() {
	  
      	<!-- alert("onYouTubePlayerAPIReady"); -->
		
		var videoid;
	    if(hrefUrl.indexOf("?") > -1)
	    {
	       var result = hrefUrl.split("?");
		   
	    	var re = result[1].split("=");
			videoid = re[1];
	    }
        player = new YT.Player('player', {
          height: '760',
          width: '1280',
          videoId: videoid,//'KKTpVZyUhCk', //'KKTpVZyUhCk',//'ZvECTnPOQxc',// 'Q-4d5gcVSq8','KKTpVZyUhCk', 'u1zgFlCw8Aw',	//'nosxWs_hh_g',''E88d4e1gYh0'
          playerVars:{'controls':0,'showinfo':0,'autoplay':1,'rel':1,'disablekb':1},
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
          }
          
        });
      }
	  
      // 4. The API will call this function when the video player is ready.
      function onPlayerReady(event) {
     		<!-- alert("======= onPlayerReady ========"); -->
			window.youtube.onPlayerReady(); 
			setInterval("updatetime()",1000);
			 <!-- vplayer = event.target;  --> 
     		/* setInterval("updatetime()",1000);   */
			<!--event.target.playVideo(); -->
      }
	   
      function onPlayerStateChange(event) {
      	//alert("onPlayerStateChange event.data ="+event.data);
		//window.youtube.onStateChange(parseInt(event.data));
        if (event.data == YT.PlayerState.ENDED) {
      //  	alert("=============== onPlayerStateChange, event.data ="+event.data);
        //  setTimeout(stopVideo, 10000);
			window.youtube.onPlayEnd();
        }
      }
       function stopVideo() {
      	//alert("stopVideo");
        player.stopVideo();
      }
	  function playVideo() {
        player.playVideo();
	  }
	  function pauseVideo() {
      	//alert("stopVideo");
        player.pauseVideo();
	  }
	  function clearVideo() {
      	//alert("stopVideo");
        player.clearVideo();
	  }
	  function updatetime()
		{
			if(player)
			{
				var curtime = player.getCurrentTime();
				var duration = player.getDuration();
				window.youtube.updateTime(parseInt(curtime), parseInt(duration));
			}
		}
	  function seekToPosition(seconds, allowSeekAhead) 
	  {
      	player.seekTo(seconds, allowSeekAhead);
	  }
	  /*function loadVideoById(videoId)
	  {
		//player.loadVideoById(videoId, 0, "default");
	  } */
    </script>
  </body>
</html>
